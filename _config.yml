# ------------------------------------------------------------------------------
# Jupyter Book configuration
# Book: A Little Bit of Everything in Biostatistics for Health Science Students
# ------------------------------------------------------------------------------

title: "A Little Bit of Everything in Biostatistics for Health Science Students"
author: "Payton Yau and Suhirthakumar Puvanendran"
copyright: "2026"
logo: ""

execute:
  execute_notebooks: "off"

# The HTML settings for the buttons
html:
  use_repository_button: true
  use_issues_button: true
  use_edit_page_button: true
  home_page_in_navbar: true

# THIS IS THE PIECE THAT WAS MISSING CAUSING THE CRASH:
repository:
  url: "https://github.com/paytonyau/biostats-book"
  branch: "main"
  path_to_book: ""

parse:
  myst_enable_extensions:
    - dollarmath
    - amsmath
    - colon_fence
    - deflist
    - html_image

bibtex_bibfiles:
  - references.bib
