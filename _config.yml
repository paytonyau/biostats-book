# ------------------------------------------------------------------------------
# Jupyter Book configuration
# Book: A Little Bit of Everything in Biostatistics for Health Science Students
# ------------------------------------------------------------------------------

title: "A Little Bit of Everything in Biostatistics for Health Science Students"
author: "Payton Yau, Suhirthakumar Puvanendran and Jarunee Nualyong"
copyright: "2026"
logo: "images/logo.png"  # UPGRADE 1: Point this to an actual image file (e.g., book cover) to replace the default Jupyter logo

execute:
  execute_notebooks: "off"  # Perfect since you are providing the R/PSPP code for them to run locally

# The HTML settings for the buttons
html:
  use_repository_button: true
  use_issues_button: true
  use_edit_page_button: true
  home_page_in_navbar: true
  # UPGRADE 2: Add a custom footer or announcement banner if desired
  # announcement: "Welcome to the 2026 Edition of A Little Bit of Everything in Biostatistics!"

# Repository configuration
repository:
  url: "https://github.com/paytonyau/biostats-book"
  branch: "main"
  path_to_book: ""

parse:
  myst_enable_extensions:
    - dollarmath
    - amsmath
    - colon_fence
    - deflist
    - html_image
    - linkify       # UPGRADE 3: Automatically turns bare URLs (like your references) into clickable links
    - substitution  # UPGRADE 4: Allows you to define variables (like dataset sizes) globally

# UPGRADE 5: Sphinx configurations for textbooks
sphinx:
  config:
    numfig: false              # Disable automatic numbering of figures, tables, and code blocks            
    math_numfig: true       # Automatically numbers your LaTeX equations

bibtex_bibfiles:
  - references.bib